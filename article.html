  .article-body ul, .article-body ol {

  .article-body blockquote {

  /* ─── SHARE BAR ─── */
  .share-bar {
    display: flex;

<script>
const GITHUB_USER = 'wolcamedia';
const GITHUB_REPO = 'wolca-media';

function getQueryParam(name) {
  const url = new URLSearchParams(window.location.search);
  return url.get(name);
}

function parseFrontmatter(text) {
  const match = text.match(/^---\n([\s\S]*?)\n---/);
  if (!match) return null;
  const fm = match[1];
  const body = text.slice(match[0].length).trim();

  const get = (key) => {
    const m = fm.match(new RegExp(`^${key}:\\s*["']?(.+?)["']?\\s*$`, 'm'));
    return m ? m[1].trim() : '';
  };

  return {
    title: get('title') || 'Untitled',
    category: get('category'),
    author: get('author'),
    date: get('date'),
    image: get('image'),
    body: body
  };
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    return new Date(dateStr).toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  } catch { return dateStr; }
}

function markdownToHTML(md) {
  return md
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h2>$1</h2>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .split('\n\n')
    .map(p => p.trim())
    .filter(p => p && !p.startsWith('<h') && !p.startsWith('<ul') && !p.startsWith('<blockquote'))
    .map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`)
    .join('') +
    md.split('\n\n').filter(p => p.startsWith('#') || p.startsWith('<ul') || p.startsWith('>')).join('');
}

function renderMarkdown(md) {
  let html = md;
  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h2>$1</h2>');
  // Bold / italic
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Blockquote
  html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  // Lists
  html = html.replace(/^[-—] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
  // Paragraphs
  html = html.split(/\n\n+/).map(block => {
    block = block.trim();
    if (!block) return '';
    if (block.match(/^<(h[1-6]|ul|blockquote)/)) return block;
    return `<p>${block.replace(/\n/g, '<br>')}</p>`;
  }).join('\n');
  return html;
}

async function loadArticle() {
  const postFile = getQueryParam('post');
  if (!postFile) {
    document.getElementById('article-container').innerHTML = '<div class="loading">Article not found.</div>';
    return;
  }

  try {
    const rawUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/_posts/${postFile}`;
    const res = await fetch(rawUrl);
    if (!res.ok) throw new Error('Not found');
    const text = await res.text();
    const article = parseFrontmatter(text);
    if (!article) throw new Error('Parse error');

    document.title = `${article.title} — Wolca Media`;

    const shareUrl = encodeURIComponent(window.location.href);
    const shareText = encodeURIComponent(article.title + ' — Wolca Media');

    document.getElementById('article-container').innerHTML = `
      ${article.image ? `
      <div class="article-hero">
        <img src="${article.image}" alt="${article.title}">
        <div class="article-hero-overlay"></div>
      </div>` : ''}

      <div class="article-wrapper">
        ${article.category ? `<div class="article-cat">${article.category}</div>` : ''}
        <h1 class="article-title">${article.title}</h1>
        <div class="article-meta">
          ${article.author ? `<span>By ${article.author}</span><span class="dot">●</span>` : ''}
          <span>${formatDate(article.date)}</span>
          <span class="dot">●</span>
          <span>Wolca Media</span>
        </div>
        <div class="article-body">
          ${renderMarkdown(article.body)}
        </div>
        <div class="share-bar">
          <span class="share-label">Share:</span>
          <a class="share-btn" href="https://twitter.com/intent/tweet?url=${shareUrl}&text=${shareText}" target="_blank">X / Twitter</a>
          <a class="share-btn" href="https://www.facebook.com/sharer/sharer.php?u=${shareUrl}" target="_blank">Facebook</a>
          <a class="share-btn" href="https://wa.me/?text=${shareText}%20${shareUrl}" target="_blank">WhatsApp</a>
        </div>
      </div>
    `;
  } catch (e) {
    document.getElementById('article-container').innerHTML = '<div class="loading">Could not load article. Please try again.</div>';
  }
}

loadArticle();
</script>
